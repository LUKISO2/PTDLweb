<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  
  <title>PTDL: A Prehraj.to Downloader</title>
  <meta name="description" content="PTDL lets you quickly grab download links from Prehraj.to / Prehrajto.cz" />
  <meta name="theme-color" content="#0d1117" />

  <link rel="icon" href="logo.png" type="image/png" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Header -->
  <header class="app-header">
    <div class="brand" style="display:flex; justify-content:space-between; width:100%;">
      <a href="/" style="text-decoration:none; color:inherit; display:flex; gap:0.75rem; align-items:center;">
        <img src="logo.png" alt="PTDL Logo" class="logo" />
        <h1>PTDL</h1>
      </a>
      <button id="openAuthBtn" class="btn ghost green">Login</button>
    </div>
  </header>

  <!-- Main Content -->
  <main class="container">
    
    
    <!-- Token Auth Overlay -->
    <div id="authOverlay" class="auth-overlay hidden">
      <div class="auth-dialog card">
        <h2>Enter Token</h2>
        <p>A valid token is required to perform searches.</p>
        <div class="fetch-form" style="margin-top: 1rem; flex-wrap: nowrap;">
          <input type="password" id="tokenInput" placeholder="Enter your token..." style="flex:1; padding:0.75rem; border-radius:var(--radius); border:1px solid var(--bg-2); background:var(--bg-2); color:var(--fg-0); min-width: 0;"/>
          <button id="saveTokenBtn" class="btn primary" style="white-space: nowrap;">Save</button>
        </div>
      </div>
    </div>

    <section class="card input-card" aria-labelledby="input-title">
      <h2 id="input-title">Get Links or Search</h2>
      <form id="fetchForm" class="input-group" autocomplete="off">
        <label for="urlInput" class="sr-only">Enter URL or Search Query</label>
        <input
          type="text"
          id="urlInput"
          name="url"
          placeholder="https://prehraj.to/... or search query"
          required
          aria-required="true"
        />
        <button id="fetchBtn" type="submit" class="btn primary icon-btn" aria-label="Search">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 16 16">
            <path d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001c.03.04.062.078.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1.007 1.007 0 0 0-.115-.1zM12 6.5a5.5 5.5 0 1 1-11 0 5.5 5.5 0 0 1 11 0z"/>
          </svg>
        </button>
      </form>
      <p class="hint">Paste a Prehraj.to URL or type a search query and hit Enter.</p>
    </section>

    <!-- Search Results Grid -->
    <section id="searchResultsSection" class="results-card hidden" aria-labelledby="search-title">
      <h2 id="search-title">Search Results</h2>
      <div id="resultsGrid" class="results-grid"></div>
    </section>

    <!-- Video Player View -->
    <section id="playerSection" class="card hidden" aria-labelledby="player-title">
      <div class="results-header" style="margin-bottom:1rem; display:flex; justify-content:space-between; align-items:center;">
        <h2 id="player-title">Video Player</h2>
        <div style="display:flex; gap:0.5rem;">
          <select id="qualitySelect" class="quality-select" style="padding:0.5rem; background:var(--bg-2); color:var(--fg-0); border:1px solid var(--bg-2); border-radius:var(--radius);"></select>
          <a id="downloadBtn" class="btn primary" style="padding:0.5rem 1rem; text-decoration:none; display:flex; align-items:center;" download target="_blank">Download</a>
        </div>
      </div>
      <div class="video-container" style="width:100%; aspect-ratio:16/9; background:#000; border-radius:var(--radius); overflow:hidden;">
        <video id="videoPlayer" controls autoplay style="width:100%; height:100%;"></video>
      </div>

      <div id="videoInfo" style="margin-top: 1rem; padding: 1rem; background: var(--bg-2); border-radius: var(--radius); display: flex; flex-wrap: wrap; gap: 1rem; font-size: 0.9rem; color: var(--fg-1);">
      </div>
    </section>
  </main>

  <!-- Toasts -->
  <div id="toastContainer" aria-live="polite" aria-atomic="true"></div>

  <!-- Loading overlay -->
  <div id="loading" class="loading hidden" aria-hidden="true">
    <div class="spinner"></div>
  </div>

  <footer class="app-footer">
    <p>© <span id="year"><b></span> PTDL: <span class="accent">A Prehraj.to Downloader</span></b> • Built by <a href="https://github.com/LUKISO2">Lukiso</a></p>
  </footer>

  <!-- Replaced obfuscated.js with script.js to support new logic -->
  <script src="obfuscated.js"></script>
</body>
</html>
